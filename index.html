<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taylor Swift 🤠</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div id="grid-view">
      <h1>Taylor Swift 🤠</h1>
      <input type="text" id="search" placeholder="Search songs..." />
      <div class="filters" id="filters">
        <button class="filter-btn active" data-tag="all">All songs</button>
        <button class="filter-btn" data-tag="cars">🚗 Cars</button>
        <button class="filter-btn" data-tag="queercoded">🏳️‍🌈 Queer coded</button>
        <button class="filter-btn" data-tag="heartbreak">💔 Heartbreak</button>
        <button class="filter-btn" data-tag="revenge">🔥 Revenge / reclaim</button>
        <button class="filter-btn" data-tag="nostalgia">🌙 Nostalgia</button>
        <button class="filter-btn" data-tag="fame">⭐ Fame / media</button>
        <button class="filter-btn" data-tag="nature">🌿 Nature imagery</button>
        <button class="filter-btn" data-tag="wedding">💍 Wedding</button>
      </div>
      <p id="count"></p>
      <div class="grid" id="grid"></div>
    </div>
    <div id="detail-view" style="display:none;"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>

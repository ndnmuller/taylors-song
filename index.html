<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taylor Swift Songs by Theme</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Taylor Swift — Songs by Theme</h1>

    <input type="text" id="search" placeholder="Search songs..." />

    <div class="filters" id="filters">
      <button class="filter-btn active" data-tag="all">All songs</button>
      <button class="filter-btn" data-tag="cars">🚗 Cars</button>
      <button class="filter-btn" data-tag="queercoded">🏳️‍🌈 Queer coded</button>
      <button class="filter-btn" data-tag="heartbreak">💔 Heartbreak</button>
      <button class="filter-btn" data-tag="revenge">🔥 Revenge / reclaim</button>
      <button class="filter-btn" data-tag="nostalgia">🌙 Nostalgia</button>
      <button class="filter-btn" data-tag="fame">⭐ Fame / media</button>
      <button class="filter-btn" data-tag="nature">🌿 Nature imagery</button>
      <button class="filter-btn" data-tag="wedding">💍 Wedding</button>
    </div>
<div class="album-filters" id="album-filters">
  <button class="album-btn active" data-album="all">All albums</button>
  <button class="album-btn taylor" data-album="Taylor Swift">Taylor Swift</button>
  <button class="album-btn fearless" data-album="Fearless">Fearless</button>
  <button class="album-btn speaknow" data-album="Speak Now">Speak Now</button>
  <button class="album-btn red" data-album="Red">Red</button>
  <button class="album-btn a1989" data-album="1989">1989</button>
  <button class="album-btn reputation" data-album="Reputation">Reputation</button>
  <button class="album-btn lover" data-album="Lover">Lover</button>
  <button class="album-btn folklore" data-album="Folklore">Folklore</button>
  <button class="album-btn evermore" data-album="Evermore">Evermore</button>
  <button class="album-btn midnights" data-album="Midnights">Midnights</button>
  <button class="album-btn ttpd" data-album="TTPD">TTPD</button>
</div>
    <p id="count"></p>
    <div class="grid" id="grid"></div>
  </div>

  <script src="script.js"></script>
  
</body>
</html>
